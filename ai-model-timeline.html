<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Model Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ROOT VARIABLES & RESET
  ============================================================ */
  :root {
    /* Dark mode (default) */
    --bg:        #020b15;
    --bg2:       #040e1d;
    --surface:   #071e30;
    --surface2:  #0c2540;
    --border:    #163550;
    --border2:   #1f4870;
    --text:      #e8f4ff;
    --text2:     #9bbdd8;
    --text3:     #6a96b8;
    --accent:    #00d4aa;
    --glow:      rgba(0,212,170,0.3);
    --grid-line: rgba(20,55,90,0.4);
    --header-bg: rgba(2,11,21,0.97);
    --modal-bg:  #040e1d;
    --font-title: 'Orbitron', monospace;
    --font-body:  'Exo 2', sans-serif;
    --font-mono:  'Share Tech Mono', monospace;
    --radius:     8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── LIGHT MODE ── */
  html.light {
    --bg:        #f0f4f9;
    --bg2:       #e4ecf5;
    --surface:   #ffffff;
    --surface2:  #edf2f9;
    --border:    #c5d6e8;
    --border2:   #a8c0d8;
    --text:      #0d1f30;
    --text2:     #2d5070;
    --text3:     #4a7090;
    --glow:      rgba(0,140,110,0.2);
    --grid-line: rgba(160,190,220,0.4);
    --header-bg: rgba(240,244,249,0.97);
    --modal-bg:  #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ============================================================
     HEADER
  ============================================================ */
  header {
    padding: 32px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--header-bg);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 6px;
  }
  h1 {
    font-family: var(--font-title);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    transition: background var(--transition);
  }
  .header-sub {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .header-tagline {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text2);
    letter-spacing: 0.1em;
  }
  /* Theme Toggle */
  .theme-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text2);
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 6px 12px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    background: var(--surface);
    transition: all var(--transition);
    user-select: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--surface2);
  }
  .theme-toggle .icon { font-size: 0.9rem; transition: transform 0.4s ease; }
  .theme-toggle:hover .icon { transform: rotate(20deg); }

  /* ============================================================
     PROVIDER TABS
  ============================================================ */
  .provider-tabs-wrap {
    padding: 16px 40px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .provider-tabs-wrap::-webkit-scrollbar { display: none; }
  .provider-tabs {
    display: flex;
    gap: 6px;
    padding-bottom: 0;
    min-width: max-content;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--surface);
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
    white-space: nowrap;
    outline: none;
  }
  .tab-btn:hover {
    background: var(--surface2);
    color: var(--text);
  }
  .tab-btn.active {
    background: var(--bg);
    color: var(--accent);
    border-color: var(--accent);
    border-bottom-color: var(--bg);
    box-shadow: 0 -4px 12px var(--glow), inset 0 1px 0 var(--accent);
    z-index: 1;
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--bg);
  }
  .tab-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.6;
    transition: opacity var(--transition);
    flex-shrink: 0;
  }
  .tab-btn.active .tab-dot {
    opacity: 1;
    box-shadow: 0 0 6px currentColor;
  }
  .tab-count {
    font-size: 0.6rem;
    opacity: 0.5;
    padding: 1px 5px;
    border-radius: 10px;
    border: 1px solid currentColor;
    margin-left: 2px;
  }

  /* ============================================================
     MAIN CONTENT AREA
  ============================================================ */
  main {
    padding: 0 40px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Provider strip below tabs */
  .provider-header {
    padding: 20px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.4s ease;
  }
  .provider-name-large {
    font-family: var(--font-title);
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 20px var(--glow);
  }
  .provider-desc {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text2);
    max-width: 500px;
    line-height: 1.6;
  }
  .provider-stats {
    margin-left: auto;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text2);
  }
  .provider-stats strong {
    color: var(--accent);
    display: block;
    font-size: 1.4rem;
    font-family: var(--font-title);
  }

  /* ============================================================
     TIMELINE
  ============================================================ */
  .timeline {
    position: relative;
    padding: 20px 0 60px;
    animation: fadeIn 0.5s ease;
  }
  /* Center spine */
  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    transform: translateX(-50%);
    background: linear-gradient(
      180deg,
      var(--accent) 0%,
      rgba(var(--accent-rgb, 0,212,170), 0.4) 40%,
      rgba(var(--accent-rgb, 0,212,170), 0.1) 80%,
      transparent 100%
    );
    box-shadow: 0 0 8px var(--glow);
  }
  /* Year markers */
  .year-marker {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: center;
    margin: 10px 0 4px;
  }
  .year-marker span {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text2);
    background: var(--bg);
    padding: 2px 10px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    letter-spacing: 0.12em;
  }

  /* Timeline item */
  .tl-item {
    display: flex;
    align-items: flex-start;
    position: relative;
    margin-bottom: 12px;
    min-height: 90px;
    animation: slideIn 0.4s ease both;
  }
  .tl-item:nth-child(even) { flex-direction: row-reverse; }

  /* Node (circle on spine) */
  .tl-node {
    position: absolute;
    left: 50%;
    top: 22px;
    transform: translateX(-50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--bg2);
    border: 2px solid var(--accent);
    box-shadow: 0 0 12px var(--glow), inset 0 0 8px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    cursor: default;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .tl-node::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.08), transparent 60%);
  }
  .tl-node-inner {
    font-family: var(--font-mono);
    font-size: 0.52rem;
    color: var(--accent);
    text-align: center;
    line-height: 1.2;
    letter-spacing: 0.05em;
    padding: 2px;
    z-index: 1;
    font-weight: bold;
    text-shadow: 0 0 6px var(--glow);
  }
  .tl-item:hover .tl-node {
    transform: translateX(-50%) scale(1.15);
    box-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
  }

  /* Connecting line from node to card */
  .tl-connector {
    width: calc(50% - 36px);
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent));
    position: absolute;
    top: 47px;
    right: calc(50% + 26px);
    opacity: 0.3;
  }
  .tl-item:nth-child(even) .tl-connector {
    background: linear-gradient(270deg, transparent, var(--accent));
    right: auto;
    left: calc(50% + 26px);
  }

  /* Card side */
  .tl-card-side {
    width: calc(50% - 50px);
    padding-right: 20px;
  }
  .tl-item:nth-child(even) .tl-card-side {
    padding-right: 0;
    padding-left: 20px;
  }

  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }
  .tl-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity var(--transition);
  }
  .tl-card:hover {
    background: var(--surface2);
    border-color: var(--border2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(0,0,0,0.2);
    transform: translateY(-2px);
  }
  .tl-card:hover::before { opacity: 1; }

  .card-model-name {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: bold;
    color: var(--text);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .card-date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-date {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text2);
    letter-spacing: 0.08em;
  }
  .badge {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge-lang   { color: #00d4aa; border-color: #00d4aa22; background: #00d4aa11; }
  .badge-multi  { color: #a78bfa; border-color: #a78bfa22; background: #a78bfa11; }
  .badge-code   { color: #38bdf8; border-color: #38bdf822; background: #38bdf811; }
  .badge-reason { color: #fb923c; border-color: #fb923c22; background: #fb923c11; }
  .badge-vision { color: #f472b6; border-color: #f472b622; background: #f472b611; }
  .badge-embed  { color: #4ade80; border-color: #4ade8022; background: #4ade8011; }
  .badge-open   { color: #fbbf24; border-color: #fbbf2422; background: #fbbf2411; }

  .card-stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .stat-item {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text2);
  }
  .stat-item span {
    color: var(--accent);
    font-weight: bold;
  }

  .card-footer {
    display: flex;
    justify-content: flex-end;
  }
  .btn-dive {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all var(--transition);
  }
  .btn-dive:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 12px var(--glow);
  }

  /* ============================================================
     MODAL
  ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,11,21,0.75);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }
  html.light .modal-overlay {
    background: rgba(180,200,220,0.7);
  }
  .modal-overlay.open {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    background: var(--modal-bg);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.92) translateY(16px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px var(--glow);
  }
  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }
  .modal-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--modal-bg);
    z-index: 2;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .modal-title-block {}
  .modal-provider-tag {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.8;
  }
  .modal-model-name {
    font-family: var(--font-title);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    text-shadow: 0 0 20px var(--glow);
  }
  .modal-date {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text2);
    margin-top: 4px;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .modal-close:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--bg);
  }
  .modal-body {
    padding: 20px 24px 28px;
  }
  .modal-desc {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 24px;
    padding: 14px;
    background: var(--surface);
    border-radius: var(--radius);
    border-left: 3px solid var(--accent);
  }
  .modal-section {
    margin-bottom: 20px;
  }
  .modal-section-title {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .spec-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .spec-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .spec-label {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .spec-value {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text);
    font-weight: bold;
  }
  .spec-value.accent { color: var(--accent); }
  .caps-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cap-tag {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    letter-spacing: 0.06em;
  }
  .hw-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text2);
    line-height: 1.6;
  }
  .modal-badge-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  /* Light mode: ensure modal box-shadow is softer */
  html.light .modal {
    box-shadow: 0 8px 40px rgba(0,0,0,0.2), 0 0 20px var(--glow);
  }
  html.light .tl-card {
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  html.light .tl-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.12), 0 0 10px var(--glow);
  }

  /* ============================================================
     EMPTY / LOADING STATES
  ============================================================ */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }
  .empty-state .big { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

  /* ============================================================
     ANIMATIONS
  ============================================================ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px var(--glow); }
    50%       { box-shadow: 0 0 24px var(--glow), 0 0 40px var(--glow); }
  }
  .tl-node { animation: pulse 3s ease-in-out infinite; }

  /* ============================================================
     SCROLLBAR
  ============================================================ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width: 700px) {
    header { padding: 20px; }
    main { padding: 0 20px 60px; }
    .provider-tabs-wrap { padding: 12px 20px 0; }
    h1 { font-size: 1.2rem; }
    .timeline::before { left: 24px; transform: none; }
    .tl-item, .tl-item:nth-child(even) { flex-direction: row; }
    .tl-node { left: 24px; top: 16px; width: 40px; height: 40px; transform: translateX(-50%); }
    .tl-node-inner { font-size: 0.45rem; }
    .tl-card-side,
    .tl-item:nth-child(even) .tl-card-side {
      width: 100%;
      padding-left: 72px;
      padding-right: 0;
    }
    .tl-connector,
    .tl-item:nth-child(even) .tl-connector { display: none; }
    .spec-grid { grid-template-columns: 1fr; }
    .provider-name-large { font-size: 1.4rem; }
    .provider-stats { display: none; }
  }
</style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<header>
  <div class="header-top">
    <h1 id="site-title">AI Model Timeline</h1>
    <span class="header-sub">// Foundational Models Index</span>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
      <span class="icon" id="theme-icon">☀️</span>
      <span id="theme-label">Light Mode</span>

/* ============================================================
   RENDER ENGINE
============================================================ */
let currentProvider = 0;

function getProviderVars(provider) {
  return `--accent: ${provider.color}; --glow: rgba(${provider.colorRGB},0.25);`;
}

function getBadgeClass(type) {
  const map = {
    Language: 'badge-lang', Multimodal: 'badge-multi', Code: 'badge-code',
    Reasoning: 'badge-reason', Vision: 'badge-vision', Embedding: 'badge-embed', Open: 'badge-open'
  };
  return map[type] || 'badge-lang';
}

function formatShortName(name) {
  // Truncate to fit the circle
  if (name.length <= 6) return name;
  return name.slice(0, 6);
}

function buildProviderTabs() {
  const container = document.getElementById('provider-tabs');
  PROVIDERS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.style.setProperty('--accent', p.color);
    btn.innerHTML = `
      <span class="tab-dot" style="background:${p.color}"></span>
      ${p.name}
      <span class="tab-count">${p.models.length}</span>
    `;
    btn.onclick = () => switchProvider(i, btn);
    container.appendChild(btn);
  });
}

function switchProvider(idx, btn) {
  currentProvider = idx;
  // Update tabs
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Update CSS vars on root for accent color
  const p = PROVIDERS[idx];
  document.documentElement.style.cssText = getProviderVars(p);
  // Re-render
  renderProvider(idx);
}

function renderProvider(idx) {
  const p = PROVIDERS[idx];
  document.documentElement.style.setProperty('--accent', p.color);
  document.documentElement.style.setProperty('--glow', `rgba(${p.colorRGB},0.25)`);

  // Header
  const hdr = document.getElementById('provider-header');
  const sortedModels = [...p.models].sort((a, b) => b.date.localeCompare(a.date));
  hdr.innerHTML = `
    <div>
      <div class="provider-name-large">${p.name}</div>
      <div class="provider-desc">${p.description}</div>
    </div>
    <div class="provider-stats">
      <strong>${p.models.length}</strong>
      models tracked
    </div>
  `;
  hdr.style.animation = 'none';
  setTimeout(() => hdr.style.animation = '', 10);

  // Timeline
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  // Group by year for year markers
  let currentYear = null;
  sortedModels.forEach((model, i) => {
    const year = model.date.slice(0, 4);
    if (year !== currentYear) {
      currentYear = year;
      const ym = document.createElement('div');
      ym.className = 'year-marker';
      ym.innerHTML = `<span>◆ ${year} ◆</span>`;
      tl.appendChild(ym);
    }

    const item = document.createElement('div');
    item.className = 'tl-item';
    item.style.animationDelay = `${i * 0.06}s`;

    const shortLabel = model.shortName || formatShortName(model.name);

    item.innerHTML = `
      <div class="tl-connector"></div>
      <div class="tl-node" title="${model.name}">
        <div class="tl-node-inner">${shortLabel}</div>
      </div>
      <div class="tl-card-side">
        <div class="tl-card">
          <div class="card-model-name">${model.name}</div>
          <div class="card-date-row">
            <span class="card-date">${model.displayDate}</span>
            <span class="badge ${getBadgeClass(model.type)}">${model.type}</span>
          </div>
          <div class="card-stats">
            <div class="stat-item">Params: <span>${model.brief.params}</span></div>
            <div class="stat-item">Context: <span>${model.brief.context}</span></div>
            <div class="stat-item">Access: <span>${model.brief.access}</span></div>
          </div>
          <div class="card-footer">
            <button class="btn-dive" onclick="openModal('${model.id}', ${idx})">Deep Dive →</button>
          </div>
        </div>
      </div>
    `;
    tl.appendChild(item);
  });
}

/* ============================================================
   MODAL
============================================================ */
function openModal(modelId, providerIdx) {
  const p = PROVIDERS[providerIdx];
  const model = p.models.find(m => m.id === modelId);
  if (!model) return;

  document.getElementById('modal-provider').textContent = `// ${p.name.toUpperCase()}`;
  document.getElementById('modal-name').textContent = model.name;
  document.getElementById('modal-date').textContent = `Released: ${model.displayDate}`;

  const d = model.details;
  const capsHTML = (d.capabilities || []).map(c => `<span class="cap-tag">${c}</span>`).join('');
  const inputHTML = (d.inputTypes || []).map(t => `<span class="cap-tag">${t}</span>`).join('');
  const outputHTML = (d.outputTypes || []).map(t => `<span class="cap-tag">${t}</span>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-desc">${d.description}</div>

    <div class="modal-section">
      <div class="modal-section-title">Core Specifications</div>
      <div class="spec-grid">
        <div class="spec-item">
          <div class="spec-label">Parameters</div>
          <div class="spec-value accent">${d.parameters}</div>
        </div>
        <div class="spec-item">
          <div class="spec-label">Context Window</div>
          <div class="spec-value accent">${d.contextWindow}</div>
        </div>
        <div class="spec-item">
          <div class="spec-label">Training Cutoff</div>
          <div class="spec-value">${d.trainingCutoff}</div>
        </div>
        <div class="spec-item">
          <div class="spec-label">Pricing</div>
          <div class="spec-value">${d.pricing}</div>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Input / Output</div>
      <div class="spec-item" style="margin-bottom:8px">
        <div class="spec-label">Input Types</div>
        <div class="caps-list" style="margin-top:6px">${inputHTML}</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Output Types</div>
        <div class="caps-list" style="margin-top:6px">${outputHTML}</div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Hardware Requirements</div>
      <div class="hw-box">${d.hardware}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Capabilities</div>
      <div class="caps-list">${capsHTML}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Notable Fact</div>
      <div class="modal-desc" style="border-left-color:#f59e0b; margin-bottom:0">⚡ ${d.notable}</div>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalBtn();
});

/* ============================================================
   THEME TOGGLE
============================================================ */
let isLight = false;

function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('theme-icon').textContent  = isLight ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isLight ? 'Dark Mode' : 'Light Mode';
  // Persist preference
  try { localStorage.setItem('aitml-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}

/* ============================================================
   INIT
============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  // Load saved theme
  try {
    const saved = localStorage.getItem('aitml-theme');
    if (saved === 'light') {
      isLight = true;
      document.documentElement.classList.add('light');
      document.getElementById('theme-icon').textContent  = '🌙';
      document.getElementById('theme-label').textContent = 'Dark Mode';
    }
  } catch(e) {}

  buildProviderTabs();
  const p = PROVIDERS[0];
  document.documentElement.style.setProperty('--accent', p.color);
  document.documentElement.style.setProperty('--glow', `rgba(${p.colorRGB},0.25)`);
  renderProvider(0);
});
</script>
